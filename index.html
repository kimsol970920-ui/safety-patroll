<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관리감독자 업무 점검</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg:#0a0c0f; --surface:#111418; --surface2:#181d24; --surface3:#1e2530;
    --accent:#f5a623; --accent2:#e8431a; --green:#22c55e; --red:#ef4444;
    --yellow:#f59e0b; --text:#e8edf2; --text2:#8fa0b0;
    --border:#2a3340; --glow:rgba(245,166,35,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* HEADER — 아이콘 제거 */
  .header{background:linear-gradient(135deg,#0f1318,#161c26);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
  .header-title{font-size:15px;font-weight:700;color:var(--text);}
  .header-sub{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
  .shift-badge{margin-left:auto;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;white-space:nowrap;}

  /* STEPS */
  .steps{display:flex;gap:4px;padding:16px 18px 0;}
  .step-dot{flex:1;height:4px;background:var(--border);border-radius:2px;transition:background 0.3s;}
  .step-dot.active{background:var(--accent);}
  .step-dot.done{background:var(--green);}

  .main{padding:14px 18px 40px;max-width:640px;margin:0 auto;}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;animation:fadeUp 0.3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;font-family:'JetBrains Mono',monospace;}
  .card-title{font-size:17px;font-weight:700;margin-bottom:14px;}

  /* OPTION BUTTONS */
  .option-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .option-grid.cols4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .option-grid.cols3{grid-template-columns:1fr 1fr 1fr;}
  .option-btn{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:16px;font-weight:700;color:var(--text2);}
  .option-btn:hover{border-color:var(--accent);color:var(--accent);}
  .option-btn.selected{background:linear-gradient(135deg,rgba(245,166,35,0.15),rgba(232,67,26,0.1));border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px var(--glow);}

  /* GPS — 숨김 처리, 기능은 동작 */
  .gps-hidden{display:none;}

  /* 위치 차단 안내 */
  .block-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.4);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;}
  .block-box .b-icon{font-size:36px;margin-bottom:10px;}
  .block-box .b-title{font-size:16px;font-weight:700;color:var(--red);margin-bottom:6px;}
  .block-box .b-sub{font-size:12px;color:#fca5a5;line-height:1.6;}

  /* SECTION TITLE */
  .sec-title{font-size:13px;font-weight:700;color:var(--accent);margin:18px 0 8px;display:flex;align-items:center;gap:6px;}
  .sec-title::before{content:'';display:block;width:3px;height:13px;background:var(--accent);border-radius:2px;}

  /* CHECK ITEM — 텍스트 위, 버튼 아래 레이아웃 */
  .check-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:all 0.15s;}
  .check-item-text{font-size:21.6px;line-height:1.55;color:var(--text);margin-bottom:10px;}
  .check-item-text .tag{display:inline-block;font-size:12px;padding:2px 7px;border-radius:4px;margin-right:6px;font-weight:700;font-family:'JetBrains Mono',monospace;vertical-align:middle;}
  .tag-common{background:rgba(59,130,246,0.2);color:#60a5fa;}
  .tag-morning{background:rgba(245,166,35,0.2);color:#fbbf24;}
  .tag-afternoon{background:rgba(34,197,94,0.2);color:#4ade80;}
  .tag-night{background:rgba(139,92,246,0.2);color:#a78bfa;}
  /* 버튼 줄 — 다음 줄, 가로 균등 배치 */
  .check-btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
  .cBtn{height:46px;border-radius:9px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all 0.15s;color:var(--text2);width:100%;}
  .cBtn:hover{transform:scale(1.05);}
  .cBtn.ok.active{background:rgba(34,197,94,0.2);border-color:var(--green);color:var(--green);}
  .cBtn.partial.active{background:rgba(245,158,11,0.2);border-color:var(--yellow);color:var(--yellow);}
  .cBtn.ng.active{background:rgba(239,68,68,0.2);border-color:var(--red);color:var(--red);}
  .cBtn.na.active{background:rgba(100,116,139,0.2);border-color:#64748b;color:#94a3b8;}

  /* PROGRESS */
  .prog-text{font-size:11px;color:var(--text2);margin-bottom:5px;font-family:'JetBrains Mono',monospace;}
  .prog-wrap{background:var(--surface2);border-radius:3px;height:5px;margin-bottom:18px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.4s;}

  /* LEGEND */
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);}
  .leg-dot{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}

  /* TEXTAREA */
  .ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;}
  .ta:focus{border-color:var(--accent);}

  /* NG ROW */
  .ng-row{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .ng-item-name{font-size:14px;color:var(--text);margin-bottom:8px;font-weight:500;line-height:1.5;}

  /* BUTTONS */
  .btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:15px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;margin-top:8px;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,166,35,0.3);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-ghost{background:transparent;border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;margin-top:6px;width:100%;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

  /* SUMMARY */
  .sum-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .sum-row:last-child{border-bottom:none;}
  .sum-label{color:var(--text2);}
  .sum-value{font-weight:600;color:var(--text);}
  .stat-chips{display:flex;gap:7px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
  .stat-chip{padding:6px 14px;border-radius:16px;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .chip-ok{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
  .chip-partial{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3);}
  .chip-ng{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
  .chip-na{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.3);}

  .info-box{background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.3);border-radius:9px;padding:11px 14px;font-size:13px;color:#fcd34d;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;}

  /* RESULT */
  .result-icon{width:68px;height:68px;border-radius:50%;background:rgba(34,197,94,0.15);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px;animation:scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes scaleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

  /* OVERLAY */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .overlay.show{display:flex;}
  .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .step-screen{display:none;}
  .step-screen.active{display:block;}
</style>
</head>
<body>

<!-- HEADER — 아이콘 없음 -->
<div class="header">
  <div>
    <div class="header-title">관리감독자 업무 점검</div>
    <div class="header-sub">HANKOOK TIRE · 정련공정</div>
  </div>
  <div class="shift-badge" id="currentShiftBadge">--</div>
</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text2);" id="overlayText">처리 중...</div>
</div>

<div class="steps">
  <div class="step-dot" id="dot0"></div>
  <div class="step-dot" id="dot1"></div>
  <div class="step-dot" id="dot2"></div>
  <div class="step-dot" id="dot3"></div>
</div>

<div class="main">

  <!-- STEP 0: 근무조 선택 (GPS는 숨겨서 백그라운드 동작) -->
  <div class="step-screen active" id="step0">
    <div class="card">
      <div class="card-label">STEP 01 / 04</div>
      <div class="card-title">근무조 선택</div>

      <!-- GPS 상태 표시 숨김 — 기능은 JS에서 동작 -->
      <div class="gps-hidden" id="gpsBox">
        <div id="gpsDot"></div>
        <div id="gpsText"></div>
        <div id="gpsCoords"></div>
      </div>

      <!-- 위치 벗어남 경고 (평소엔 숨김) -->
      <div id="locationBlock" style="display:none;">
        <div class="block-box">
          <div class="b-icon">📍</div>
          <div class="b-title">현장 외부 접근 불가</div>
          <div class="b-sub">현재 위치가 공장 현장에서 벗어나 있습니다.<br>현장에서만 점검을 진행할 수 있습니다.</div>
        </div>
      </div>

      <div class="option-grid cols4" id="shiftGrid">
        <div class="option-btn" onclick="selectShift('A')">A조</div>
        <div class="option-btn" onclick="selectShift('B')">B조</div>
        <div class="option-btn" onclick="selectShift('C')">C조</div>
        <div class="option-btn" onclick="selectShift('D')">D조</div>
      </div>

      <div id="shiftInfo" style="display:none;margin-top:10px;">
        <div class="info-box"><span>ℹ️</span><span id="shiftInfoText"></span></div>
      </div>

      <button class="btn-primary" id="step0Next" onclick="goStep(1)" disabled>다음 →</button>
    </div>
  </div>

  <!-- STEP 1: 교대 선택 (이모지·한자 제거) -->
  <div class="step-screen" id="step1">
    <div class="card">
      <div class="card-label">STEP 02 / 04</div>
      <div class="card-title">근무 교대 선택</div>
      <div class="option-grid cols3" id="turnGrid">
        <div class="option-btn" onclick="selectTurn('전')">오전</div>
        <div class="option-btn" onclick="selectTurn('후')">오후</div>
        <div class="option-btn" onclick="selectTurn('야')">야간</div>
      </div>
      <button class="btn-ghost" onclick="goStep(0)">← 이전</button>
      <button class="btn-primary" id="step1Next" onclick="goStep(2)" disabled>다음 →</button>
    </div>
  </div>

  <!-- STEP 2: 체크리스트 (텍스트 위, 버튼 아래) -->
  <div class="step-screen" id="step2">
    <div class="card">
      <div class="card-label">STEP 03 / 04</div>
      <div class="card-title" id="checkTitle">점검 체크리스트</div>

      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:rgba(34,197,94,0.2);color:var(--green);border:1.5px solid var(--green);">○</div>양호</div>
        <div class="leg-item"><div class="leg-dot" style="background:rgba(245,158,11,0.2);color:var(--yellow);border:1.5px solid var(--yellow);">△</div>보완</div>
        <div class="leg-item"><div class="leg-dot" style="background:rgba(239,68,68,0.2);color:var(--red);border:1.5px solid var(--red);">X</div>불량</div>
        <div class="leg-item"><div class="leg-dot" style="background:rgba(100,116,139,0.2);color:#94a3b8;border:1.5px solid #64748b;">-</div>해당없음</div>
      </div>

      <div class="prog-text" id="progText">0 / 0 항목 완료</div>
      <div class="prog-wrap"><div class="prog-fill" id="progBar" style="width:0%"></div></div>

      <div id="checklistContainer"></div>

      <div class="sec-title" style="margin-top:20px;">기타 사항</div>
      <textarea class="ta" id="memoEtc" placeholder="기타 특이사항을 자유롭게 입력하세요..."></textarea>

      <button class="btn-ghost" onclick="goStep(1)">← 이전</button>
      <button class="btn-primary" id="step2Next" onclick="goStep(3)" disabled>결과 확인 →</button>
    </div>
  </div>

  <!-- STEP 3: 부적합 및 최종 확인 (GPS 좌표 제외) -->
  <div class="step-screen" id="step3">
    <div class="card">
      <div class="card-label">STEP 04 / 04</div>
      <div class="card-title">부적합 사항 및 최종 확인</div>
      <div id="ngSection"></div>
      <div id="summaryContent"></div>
      <div style="margin-top:14px;">
        <div class="card-label">수신 이메일 (해당 조)</div>
        <div id="emailList" style="font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;line-height:2;"></div>
      </div>
      <button class="btn-ghost" onclick="goStep(2)">← 수정</button>
      <button class="btn-primary" onclick="submitResult()">📤 제출 및 이메일 발송</button>
    </div>
  </div>

  <!-- STEP 4: 완료 -->
  <div class="step-screen" id="step4">
    <div class="card" style="text-align:center;padding:28px 18px;">
      <div class="result-icon" id="resultIcon">✅</div>
      <div style="font-size:19px;font-weight:700;margin-bottom:8px;">점검 완료</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px;" id="resultSub"></div>
      <div id="resultStats"></div>
      <div style="margin-top:20px;padding:14px;background:var(--surface2);border-radius:10px;text-align:left;">
        <div class="card-label" style="margin-bottom:6px;">발송 내역</div>
        <div id="emailSentList" style="font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;line-height:2;"></div>
      </div>
      <button class="btn-primary" style="margin-top:18px;" onclick="resetAll()">🔄 새 점검 시작</button>
    </div>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyx1UNeXi_U__DUMApuSLANUODE1TORnX3C3PCQE9l0ND_-ZQiGV15fbROew68eyekU/exec';

const EMAIL_MAP = {
  'A':['19573091@hankookn.com','kimsol@hankookn.com','milal11@hankookn.com'],
  'B':['19670334@hankookn.com','kimsol@hankookn.com','milal11@hankookn.com'],
  'C':['19672549@hankookn.com','kimsol@hankookn.com','milal11@hankookn.com'],
  'D':['19474718@hankookn.com','kimsol@hankookn.com','milal11@hankookn.com'],
};

// ── GPS 현장 위치 설정 ────────────────────────────────────────────────
// 한국타이어 대전공장 좌표 — 실제 좌표로 변경 가능
const SITE_LAT  = 36.3504;   // ← 실제 공장 위도로 변경
const SITE_LNG  = 127.3845;  // ← 실제 공장 경도로 변경
const SITE_RADIUS_M = 300;   // 허용 반경 (미터) — 필요시 조정

// 두 좌표 간 거리 계산 (Haversine)
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const CHECKLIST = [
  {id:'c01',target:'common',text:'작업시작 전 근로자 상태 확인 (조회 시 확인)'},
  {id:'c02',target:'common',text:'통로, 계단에 통행 방해 요소 정리정돈'},
  {id:'c03',target:'common',text:'작업 전 방호장치 이상유무 확인 (센서, 인터록, 커버 등)'},
  {id:'c04',target:'common',text:'급정지 장치 동작 상태 확인'},
  {id:'c05',target:'common',text:'전선 연결 상태 (피복 노출 여부)'},
  {id:'c06',target:'common',text:'설비 및 주변 청소 실시 (필요 시 방진마스크 등 보호구 착용)'},
  {id:'c07',target:'common',text:'보호구 착용 상태 점검 및 보호구함 관리 상태 확인'},
  {id:'c08',target:'common',text:'지정장소 외 흡연 금지 및 휴대폰 사용 금지 확인'},
  {id:'c09',target:'common',text:'지게차 탑승 전 일상점검 여부 (QR 인증)'},
  {id:'c10',target:'common',text:'지게차 과적·목적 이외 사용·과속 여부 확인'},
  {id:'c11',target:'common',text:'위험장소 방호조치, 출입금지 조치 확인'},
  {id:'c12',target:'common',text:'지게차 운전 시 안전벨트 착용, 하차 시 시동키 분리 여부'},
  {id:'c13',target:'common',text:'정기 및 수시 위험성평가 이행 및 개선사항 확인'},
  {id:'m01',target:'전',text:'조도, 작업 발판 등의 이상유무'},
  {id:'m02',target:'전',text:'소화전·소화기 전방 1m 이내 장애물 비치 여부'},
  {id:'m03',target:'전',text:'화물용 승강기·컨베이어 탑승 여부 및 낙하 위험 여부'},
  {id:'m04',target:'전',text:'유황은 불과 직접 접촉하지 않도록 관리'},
  {id:'m05',target:'전',text:'리프트 방호장치 (과부하·비상정지·권과 방지 장치) 이상유무'},
  {id:'m06',target:'전',text:'밀폐공간 출입 작업 시 감시인 배치 및 작업방법 주지'},
  {id:'a01',target:'후',text:'기름걸레·기름묻은 장갑 뚜껑 있는 철제용기에 분리 배출'},
  {id:'a02',target:'후',text:'구급함 관리 상태 확인 및 사용법 주지'},
  {id:'a03',target:'후',text:'크레인·호이스트 후크·해지장치·체인·와이어 없음 또는 변형 여부'},
  {id:'a04',target:'후',text:'크레인·호이스트 경고표지 부착 여부 및 하중 초과 사용 여부'},
  {id:'a05',target:'후',text:'선풍기 날개·프레임 등에 손가락 접촉 위험 여부'},
  {id:'n01',target:'야',text:'조도, 작업발판 등의 이상유무'},
  {id:'n02',target:'야',text:'소화전·소화기 월간 점검 실시 여부'},
  {id:'n03',target:'야',text:'컨베이어 탑승 금지 여부 및 낙하 위험 여부'},
  {id:'n04',target:'야',text:'압력용기 명칭표기 (최고 사용압력·제조년월일·제조회사) 여부'},
  {id:'n05',target:'야',text:'안전인증 합격증 부착 여부 (압력용기, 크레인/호이스트 2T 이상, 롤)'},
  {id:'n06',target:'야',text:'화학물질 체크리스트 작성 (매일 야간조)'},
  {id:'n07',target:'야',text:'국소배기장치 체크리스트 작성 (매월 30일)'},
];

let state = {
  shift:null, turn:null,
  gpsLat:null, gpsLng:null, gpsAccuracy:null,
  gpsOk:false,   // 위치 검증 통과 여부
  checks:{}, ngMemos:{}, memo:'', timestamp:null,
};

window.onload = () => { updateStepDots(0); startGPS(); updateShiftBadge(); };

function updateShiftBadge(){
  const h = new Date().getHours();
  const t = h>=6&&h<14?'오전':h>=14&&h<22?'오후':'야간';
  document.getElementById('currentShiftBadge').textContent = `현재 ${t}`;
}

// GPS — 숨겨서 백그라운드 동작, 위치 벗어나면 진행 차단
function startGPS(){
  if(!navigator.geolocation){
    // GPS 없는 환경 — 개발/테스트 시 통과 허용
    state.gpsLat='N/A'; state.gpsLng='N/A'; state.gpsOk=true;
    chkStep0(); return;
  }
  navigator.geolocation.watchPosition(p=>{
    state.gpsLat = p.coords.latitude.toFixed(6);
    state.gpsLng = p.coords.longitude.toFixed(6);
    state.gpsAccuracy = Math.round(p.coords.accuracy);
    const dist = calcDistance(p.coords.latitude, p.coords.longitude, SITE_LAT, SITE_LNG);
    state.gpsOk = dist <= SITE_RADIUS_M;
    document.getElementById('locationBlock').style.display = state.gpsOk ? 'none' : 'block';
    chkStep0();
  }, err=>{
    // GPS 오류 시 통과 허용 (실내 환경 고려)
    state.gpsLat='N/A'; state.gpsLng='N/A'; state.gpsOk=true;
    chkStep0();
  },{enableHighAccuracy:true, timeout:10000, maximumAge:0});
}

function chkStep0(){
  document.getElementById('step0Next').disabled = !(state.shift && state.gpsOk);
}

function selectShift(s){
  state.shift=s;
  document.querySelectorAll('#shiftGrid .option-btn').forEach((el,i)=>el.classList.toggle('selected',['A','B','C','D'][i]===s));
  const now=new Date();
  document.getElementById('shiftInfo').style.display='block';
  document.getElementById('shiftInfoText').textContent=`${s}조 선택 · ${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  chkStep0();
}

function selectTurn(t){
  state.turn=t;
  const labels=['전','후','야'];
  document.querySelectorAll('#turnGrid .option-btn').forEach((el,i)=>el.classList.toggle('selected',labels[i]===t));
  document.getElementById('step1Next').disabled=false;
}

function goStep(n){
  document.querySelectorAll('.step-screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  updateStepDots(n);
  window.scrollTo(0,0);
  if(n===2) renderChecklist();
  if(n===3) renderSummary();
}

function updateStepDots(cur){
  for(let i=0;i<4;i++){
    const d=document.getElementById('dot'+i);
    d.className='step-dot'+(i<cur?' done':i===cur?' active':'');
  }
}

function getActiveItems(){
  return CHECKLIST.filter(i=>i.target==='common'||i.target===state.turn);
}

function renderChecklist(){
  const container=document.getElementById('checklistContainer');
  container.innerHTML='';
  const tLabel={'전':'오전','후':'오후','야':'야간'}[state.turn]||state.turn;
  document.getElementById('checkTitle').textContent=`${state.shift}조 ${tLabel}번 점검 체크리스트`;

  const commons=CHECKLIST.filter(i=>i.target==='common');
  const secC=document.createElement('div');
  secC.innerHTML='<div class="sec-title">공통 사항</div>';
  commons.forEach(item=>secC.appendChild(makeItem(item)));
  container.appendChild(secC);

  const turns=CHECKLIST.filter(i=>i.target===state.turn);
  if(turns.length>0){
    const secT=document.createElement('div');
    secT.innerHTML=`<div class="sec-title">${tLabel}번 전용 항목</div>`;
    turns.forEach(item=>secT.appendChild(makeItem(item)));
    container.appendChild(secT);
  }
  updateProgress();
}

function makeItem(item){
  const div=document.createElement('div');
  div.className='check-item';
  const tagClass=item.target==='common'?'tag-common':item.target==='전'?'tag-morning':item.target==='후'?'tag-afternoon':'tag-night';
  const tagLabel=item.target==='common'?'공통':item.target==='전'?'전':item.target==='후'?'후':'야';
  const cur=state.checks[item.id]||'';
  // 텍스트 윗줄, 버튼 아랫줄
  div.innerHTML=`
    <div class="check-item-text">
      <span class="tag ${tagClass}">${tagLabel}</span>${item.text}
    </div>
    <div class="check-btns">
      <button class="cBtn ok${cur==='ok'?' active':''}"      onclick="setCheck('${item.id}','ok',this)">○</button>
      <button class="cBtn partial${cur==='partial'?' active':''}" onclick="setCheck('${item.id}','partial',this)">△</button>
      <button class="cBtn ng${cur==='ng'?' active':''}"      onclick="setCheck('${item.id}','ng',this)">X</button>
      <button class="cBtn na${cur==='na'?' active':''}"      onclick="setCheck('${item.id}','na',this)">-</button>
    </div>`;
  return div;
}

function setCheck(id,val,btn){
  state.checks[id]=val;
  btn.closest('.check-btns').querySelectorAll('.cBtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateProgress();
}

function updateProgress(){
  const items=getActiveItems();
  const total=items.length;
  const done=items.filter(i=>state.checks[i.id]).length;
  document.getElementById('progText').textContent=`${done} / ${total} 항목 완료`;
  document.getElementById('progBar').style.width=(done/total*100)+'%';
  document.getElementById('step2Next').disabled=done<total;
}

function renderSummary(){
  state.memo=document.getElementById('memoEtc').value;
  const items=getActiveItems();
  const okC=items.filter(i=>state.checks[i.id]==='ok').length;
  const partC=items.filter(i=>state.checks[i.id]==='partial').length;
  const ngC=items.filter(i=>state.checks[i.id]==='ng').length;
  const naC=items.filter(i=>state.checks[i.id]==='na').length;
  const ngItems=items.filter(i=>state.checks[i.id]==='ng'||state.checks[i.id]==='partial');
  const emails=EMAIL_MAP[state.shift]||[];
  const tLabel={'전':'오전','후':'오후','야':'야간'}[state.turn]||state.turn;
  state.timestamp=new Date().toLocaleString('ko-KR');

  const ngSec=document.getElementById('ngSection');
  if(ngItems.length>0){
    let html=`<div class="sec-title" style="color:var(--red);">부적합·보완 항목 조치 사항</div>`;
    ngItems.forEach(item=>{
      const sym=state.checks[item.id]==='ng'?'X':'△';
      html+=`<div class="ng-row">
        <div class="ng-item-name">[${sym}] ${item.text}</div>
        <textarea class="ta" id="ng_${item.id}" placeholder="부적합 사항 및 조치 결과를 입력하세요...">${state.ngMemos[item.id]||''}</textarea>
      </div>`;
    });
    ngSec.innerHTML=html;
  } else {
    ngSec.innerHTML=`<div class="info-box"><span>✅</span><span>보완·불량 항목 없음 — 모든 항목 양호</span></div>`;
  }

  // GPS 좌표 제외
  document.getElementById('summaryContent').innerHTML=`
    <div class="sec-title">점검 결과 요약</div>
    <div class="sum-row"><span class="sum-label">점검 일시</span><span class="sum-value">${state.timestamp}</span></div>
    <div class="sum-row"><span class="sum-label">근무조 / 교대</span><span class="sum-value">${state.shift}조 / ${tLabel}번</span></div>
    <div class="sum-row"><span class="sum-label">총 점검 항목</span><span class="sum-value">${items.length}개</span></div>
    <div class="stat-chips">
      <div class="stat-chip chip-ok">○ 양호 ${okC}</div>
      <div class="stat-chip chip-partial">△ 보완 ${partC}</div>
      <div class="stat-chip chip-ng">X 불량 ${ngC}</div>
      <div class="stat-chip chip-na">- 해당없음 ${naC}</div>
    </div>
    ${state.memo?`<div class="sum-row"><span class="sum-label">기타 사항</span><span class="sum-value">${state.memo}</span></div>`:''}
  `;
  document.getElementById('emailList').innerHTML=emails.map(e=>`📧 ${e}`).join('<br>');
}

async function submitResult(){
  const ngItems=getActiveItems().filter(i=>state.checks[i.id]==='ng'||state.checks[i.id]==='partial');
  ngItems.forEach(item=>{const el=document.getElementById('ng_'+item.id);if(el)state.ngMemos[item.id]=el.value;});

  const overlay=document.getElementById('overlay');
  overlay.classList.add('show');
  document.getElementById('overlayText').textContent='구글 시트 저장 및 이메일 발송 중...';

  const items=getActiveItems();
  const okC=items.filter(i=>state.checks[i.id]==='ok').length;
  const partC=items.filter(i=>state.checks[i.id]==='partial').length;
  const ngC=items.filter(i=>state.checks[i.id]==='ng').length;
  const naC=items.filter(i=>state.checks[i.id]==='na').length;
  const emails=EMAIL_MAP[state.shift]||[];
  const tLabel={'전':'오전','후':'오후','야':'야간'}[state.turn]||state.turn;

  const ngDetail=ngItems.map((item,i)=>{
    const sym=state.checks[item.id]==='ng'?'X':'△';
    return `${i+1}. [${sym}] ${item.text}\n   → 조치: ${state.ngMemos[item.id]||'(미입력)'}`;
  }).join('\n');

  const emailBody=`
=== 관리감독자 업무 점검 결과 ===
▶ 점검 일시 : ${state.timestamp}
▶ 근무조    : ${state.shift}조
▶ 교대 구분 : ${tLabel}번
--- 점검 결과 ---
○ 양호    : ${okC}건
△ 보완    : ${partC}건
X 불량    : ${ngC}건
- 해당없음 : ${naC}건
${ngItems.length>0?`--- 부적합·보완 항목 ---\n${ngDetail}`:'--- 부적합 항목 없음 ✅ ---'}
--- 기타 사항 ---
${state.memo||'없음'}
  `.trim();

  const payload={
    timestamp:state.timestamp, shift:state.shift, turn:tLabel,
    gps:`${state.gpsLat}, ${state.gpsLng}`, accuracy:state.gpsAccuracy||'N/A',
    ok:okC, partial:partC, ng:ngC, na:naC,
    ngDetail:ngDetail||'없음', memo:state.memo||'없음',
    toEmails:emails.join(','),
    subject:`[안전패트롤] ${state.shift}조 ${tLabel}번 점검결과 - ${state.timestamp}`,
    emailBody:emailBody,
  };

  try{
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    overlay.classList.remove('show');
    showResult(okC,partC,ngC,naC,emails,true);
  }catch(err){
    overlay.classList.remove('show');
    showResult(okC,partC,ngC,naC,emails,false);
  }
}

function showResult(okC,partC,ngC,naC,emails,success){
  goStep(4);
  const tLabel={'전':'오전','후':'오후','야':'야간'}[state.turn]||state.turn;
  document.getElementById('resultIcon').textContent=success?'✅':'⚠️';
  document.getElementById('resultSub').textContent=
    success?`구글 시트 기록 완료 · ${state.shift}조 ${emails.length}명에게 이메일 발송`:'저장 시도 완료 (네트워크 상태 확인)';
  document.getElementById('resultStats').innerHTML=`
    <div class="stat-chips">
      <div class="stat-chip chip-ok">○ 양호 ${okC}</div>
      <div class="stat-chip chip-partial">△ 보완 ${partC}</div>
      <div class="stat-chip chip-ng">X 불량 ${ngC}</div>
      <div class="stat-chip chip-na">- ${naC}</div>
    </div>`;
  document.getElementById('emailSentList').innerHTML=emails.map(e=>`${success?'✓':'?'} ${e}`).join('<br>');
}

function resetAll(){
  state={shift:null,turn:null,gpsLat:null,gpsLng:null,gpsAccuracy:null,gpsOk:false,checks:{},ngMemos:{},memo:'',timestamp:null};
  document.getElementById('memoEtc').value='';
  document.querySelectorAll('.option-btn').forEach(el=>el.classList.remove('selected'));
  document.getElementById('step0Next').disabled=true;
  document.getElementById('step1Next').disabled=true;
  document.getElementById('shiftInfo').style.display='none';
  document.getElementById('locationBlock').style.display='none';
  goStep(0); startGPS();
}
</script>
</body>
</html>
